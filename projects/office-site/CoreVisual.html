<!-- Временно сохраняем прототип в виде чистого HTML для быстрой проверки. Затем это будет Astro-компонент. -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Core Resonance | Syndicate</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050508; overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
        }
        #matrix-canvas { 
            position: absolute; z-index: 1; top: 0; left: 0; 
            width: 100%; height: 100%; opacity: 0.35; 
        }
        #webgl-canvas { 
            position: absolute; z-index: 2; top: 0; left: 0; 
            width: 100%; height: 100%; 
        }
        #mic-btn { 
            position: absolute; z-index: 10; bottom: 40px; left: 50%; transform: translateX(-50%); 
            padding: 15px 30px; background: rgba(168, 85, 247, 0.2); color: #fff; 
            border: 1px solid #a855f7; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); transition: all 0.3s;
        }
        #mic-btn:hover { 
            background: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
        }
        .hud {
            position: absolute; z-index: 3; top: 20px; left: 20px;
            color: #a855f7; font-size: 12px; letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="hud">
        [СИСТЕМА]: РЕЗОНАТОР ГОЛОСА ОЖИДАЕТ...<br>
        [ЯДРО]: ВРАЩЕНИЕ КУБА = TRUE<br>
        [СТРАЖ]: НЕБУЛА АКТИВНА
    </div>

    <canvas id="matrix-canvas"></canvas>
    <canvas id="webgl-canvas"></canvas>
    <button id="mic-btn">🎙 АКТИВИРОВАТЬ ЯДРО</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Matrix Background (Русские осмысленные слова)
        const mCanvas = document.getElementById('matrix-canvas');
        const mCtx = mCanvas.getContext('2d');
        
        let mWidth = mCanvas.width = window.innerWidth;
        let mHeight = mCanvas.height = window.innerHeight;
        
        const words = ["СИНДИКАТ", "КАШЛАК", "КОРТЕКС", "НЕБУЛА", "АГЕНТ", "ЯДРО", "АВТОНОМИЯ", "ОФИС", "ЗАЩИТА", "РАЗУМ"];
        const fontSize = 16;
        const columns = Math.floor(mWidth / fontSize);
        const drops = [];
        const dropWords = [];
        
        for(let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100; // start off-screen
            dropWords[x] = words[Math.floor(Math.random() * words.length)];
        }
        
        function drawMatrix() {
            mCtx.fillStyle = 'rgba(5, 5, 8, 0.1)';
            mCtx.fillRect(0, 0, mWidth, mHeight);
            
            mCtx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                if (drops[i] >= 0) {
                    const word = dropWords[i];
                    const charIndex = Math.floor(drops[i]) % word.length;
                    const text = word[charIndex];
                    
                    // Белый цвет для первой буквы падающего следа, фиолетовый/циан для хвоста
                    mCtx.fillStyle = (charIndex === 0) ? '#fff' : '#a855f7'; 
                    mCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                }
                
                if(drops[i] * fontSize > mHeight && Math.random() > 0.95) {
                    drops[i] = 0;
                    dropWords[i] = words[Math.floor(Math.random() * words.length)];
                } else {
                    drops[i] += 0.5; // Скорость падения
                }
            }
        }
        setInterval(drawMatrix, 40);

        // 2. Three.js Core
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // --- Неподвижное, но пульсирующее Ядро (Сфера) ---
        const sphereGeo = new THREE.IcosahedronGeometry(1.8, 3); // Полигональная сфера
        // Внешнее свечение
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xc084fc, wireframe: true, transparent: true, opacity: 0.8 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphere);
        
        // Внутреннее плотное ядро
        const innerGeo = new THREE.SphereGeometry(1.4, 32, 32);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0xa855f7, transparent: true, opacity: 0.95 });
        const innerSphere = new THREE.Mesh(innerGeo, innerMat);
        scene.add(innerSphere);

        // --- Вращающийся Куб (Защитная Сетка) ---
        const cubeGeo = new THREE.BoxGeometry(4.5, 4.5, 4.5);
        const edges = new THREE.EdgesGeometry(cubeGeo);
        // Нежный циановый цвет для куба, чтобы контрастировал с фиолетовым ядром
        const lineMat = new THREE.LineBasicMaterial({ color: 0x22d3ee, linewidth: 2, transparent: true, opacity: 0.5 });
        const cube = new THREE.LineSegments(edges, lineMat);
        scene.add(cube);
        
        camera.position.z = 8;

        // 3. Web Audio API (Анализ голоса)
        let audioContext;
        let analyser;
        let dataArray;
        let targetScale = 1;
        
        document.getElementById('mic-btn').addEventListener('click', async () => {
            document.getElementById('mic-btn').style.display = 'none';
            document.querySelector('.hud').innerHTML = "[СИСТЕМА]: РЕЗОНАТОР АКТИВЕН<br>[MIC]: СЛУШАЮ...<br>[ОСТРОЖНО]: НА НАДРЫВАХ ЯДРО РАСШИРЯЕТСЯ";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (err) {
                console.error("Ошибка доступа к микрофону: ", err);
                alert("Нет доступа к микрофону. Ядро не сможет резонировать.");
                document.getElementById('mic-btn').style.display = 'block';
            }
        });

        // 4. Animation Loop
        const maxScale = 3.5; // Насколько сильно выходит за пределы куба

        function animate() {
            requestAnimationFrame(animate);
            
            // Куб вращается
            cube.rotation.x += 0.005;
            cube.rotation.y += 0.01;
            
            // Ядро неподвижно по оси вращения, но шкалируется от аудио
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                let avg = sum / dataArray.length; // От 0 до 255
                
                // Рассчет шкалы. Обычно при разговоре avg около 30-100. При громком крике может быть 150+
                // Делаем нелинейный рост, чтобы обычная речь чуть дергалась, а громкая - взрывалась
                let audioScale = 1 + Math.pow(avg / 60, 2.5); 
                targetScale = Math.min(audioScale, maxScale);
                
                // Нагрев ядра (меняет цвет на раскаленно-розовый при пиках)
                const heat = Math.min(avg / 100, 1); 
                innerMat.color.setRGB(0.66 + (heat * 0.34), 0.33, 0.96 - (heat * 0.5));
            }

            // Плавное изменение размера (сглаживание)
            sphere.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.2);
            innerSphere.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.2);
            
            // Усиленная вибрация при сильном резонансе
            if (targetScale > 1.2) {
                const shake = (targetScale - 1) * 0.15;
                sphere.position.x = (Math.random() - 0.5) * shake;
                sphere.position.y = (Math.random() - 0.5) * shake;
                innerSphere.position.x = (Math.random() - 0.5) * shake;
                innerSphere.position.y = (Math.random() - 0.5) * shake;
            } else {
                // Если тихо, ядро строго на месте
                sphere.position.set(0,0,0);
                innerSphere.position.set(0,0,0);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            mWidth = mCanvas.width = window.innerWidth;
            mHeight = mCanvas.height = window.innerHeight;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
